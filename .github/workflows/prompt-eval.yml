name: Prompt Evaluation

on:
  push:
    paths:
      - 'prompts/**'
      - 'evaluations/test_data/**'
      - '.github/workflows/prompt-eval.yml'
  pull_request:
    paths:
      - 'prompts/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Get your code
      - uses: actions/checkout@v3
      
      # Step 2: Install Python runtime
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Step 3: Install Python packages
      # - name: Install dependencies
      #   run: |
      #     pip install openai anthropic pyyaml python-dotenv
      - name: Install UV and sync dependencies
          run: |
            pip install uv
            uv sync
      
      # Step 4: RUN THE ACTUAL EVALUATION
      - name: Run prompt evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python evaluations/run_eval.py
      
      # Step 5: CHECK IF RESULTS ARE GOOD ENOUGH
       # TODO: Implement this script.

      # Step 6: ALWAYS UPLOAD RESULTS (even if step 5 failed)
      # Use this to ensure we have a record of the evaluation results.
      - name: Upload results
        if: always()  # ← KEY: Run even if previous steps failed
        uses: actions/upload-artifact@v6
        with:
          name: eval-results  # ← Artifact will be named "eval-results"
          path: evaluations/results/  # ← Upload everything in this folder